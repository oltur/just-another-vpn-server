# javs (just-another-vpn-server) configuration

listen = "0.0.0.0:1194"

# Optional: also accept TCP clients (proto tcp-client). Can share the same
# port number as the UDP listener since they're different L4 protocols.
# listen_tcp = "0.0.0.0:1194"

# PKI files — generate via scripts/generate-certs.sh
ca   = "configs/pki/ca.crt"
cert = "configs/pki/server.crt"
key  = "configs/pki/server.key"

# Tunnel interface
tun_name    = "javs0"          # on macOS try "utun9"
tun_ip      = "10.8.0.1"
tun_netmask = "255.255.255.0"

# Client address pool (inclusive)
client_pool_start = "10.8.0.2"
client_pool_end   = "10.8.0.254"

cipher  = "AES-256-GCM"
tun_mtu = 1500

# Routes / DNS pushed to clients in PUSH_REPLY.
#
# Default below is a SPLIT tunnel: clients can reach the tunnel subnet
# (10.8.0.0/24) and anything you list here. To make this a FULL tunnel
# (all client traffic exits via the server) push the default route AND
# turn on NAT further down:
#     push_routes = ["0.0.0.0/0"]
#     enable_nat  = true
push_routes = []
push_dns    = ["1.1.1.1", "9.9.9.9"]

# Optional IPv6 inside the tunnel. Linux only — the v6 address is attached
# to the TUN with `ip -6 addr add` at startup.
# tun_ip6              = "fd00:beef::1"
# tun_prefix6          = 64
# client_pool_start_v6 = "fd00:beef::2"
# client_pool_end_v6   = "fd00:beef::ff"
# push_routes_v6       = ["::/0"]

# Keepalive (seconds)
keepalive_ping    = 10
keepalive_timeout = 60

# Optional: HMAC-authenticate the control channel with a pre-shared key.
# Generate the key with `./scripts/generate-psk.sh configs/pki/ta.key`
# (or `openvpn --genkey --secret ...`) and add a <tls-auth> block plus
# `key-direction 1` to the client config.
# tls_auth_key           = "configs/pki/ta.key"
# tls_auth_key_direction = 1

# Optional: stronger than tls_auth — encrypt the control channel with a PSK.
# Mutually exclusive with tls_auth_key (tls_crypt wins). Generate the key
# with `./scripts/generate-psk.sh configs/pki/tc.key` and add a <tls-crypt>
# block to the client config.
# tls_crypt_key = "configs/pki/tc.key"

# Optional per-client overrides keyed by the client cert's CN. When a client
# connects with a matching CN we hand out a fixed IP and push additional
# routes on top of the global `push_routes`.
# [client_configs.alice]
# assign_ip   = "10.8.0.100"
# push_routes = ["192.168.50.0/24"]
# [client_configs.bob]
# assign_ip   = "10.8.0.101"
