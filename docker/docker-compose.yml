# End-to-end harness for javs.
#
#   ./docker/test.sh        # one-shot: build, run, assert, tear down
#   docker compose -f docker/docker-compose.yml up --build   # interactive
#
# Topology
#   edge    10.99.0.0/24 — vpn-client <-> vpn-server
#   internal 10.98.0.0/24 — vpn-server <-> target  (internal-only)
#
# The client can only reach the target after a successful tunnel + NAT.

services:
  vpn-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    sysctls:
      net.ipv4.ip_forward: "1"
    volumes:
      - ./server.toml:/etc/javs/server.toml:ro
      - ../configs/pki:/etc/javs/pki:ro
    networks:
      edge:
        ipv4_address: 10.99.0.2
      internal:
        ipv4_address: 10.98.0.2

  vpn-client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - ../configs/pki:/certs:ro
    networks:
      edge:
        ipv4_address: 10.99.0.3
    depends_on:
      - vpn-server

  target:
    image: python:3.12-alpine
    command: ["python", "-m", "http.server", "8080"]
    networks:
      internal:
        ipv4_address: 10.98.0.3

networks:
  edge:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.0.0/24
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.98.0.0/24
