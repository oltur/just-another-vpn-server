# javs server config used inside the docker-compose stack.
#
# The two-NIC topology in docker-compose.yml is:
#   eth0 → "edge" network (clients connect to 172.20.0.2:1194 here)
#   eth1 → "internal" network reachable only via the server
#
# NAT MASQUERADEs on eth1 so a connected client can reach the target
# container (172.21.0.3) even though it has no direct route.

listen     = "0.0.0.0:1194"
listen_tcp = "0.0.0.0:1194"

ca   = "/etc/javs/pki/ca.crt"
cert = "/etc/javs/pki/server.crt"
key  = "/etc/javs/pki/server.key"

tun_name    = "tun0"
tun_ip      = "10.8.0.1"
tun_netmask = "255.255.255.0"

client_pool_start = "10.8.0.2"
client_pool_end   = "10.8.0.254"

# IPv6 inside the tunnel.
tun_ip6              = "fd00:beef::1"
tun_prefix6          = 64
client_pool_start_v6 = "fd00:beef::2"
client_pool_end_v6   = "fd00:beef::ff"

cipher  = "AES-256-GCM"
tun_mtu = 1500

# Push the default route so the client tries to reach 172.21.0.0/24 via the
# tunnel. Without this, traffic to the target would stay local on the client.
push_routes = ["0.0.0.0/0"]
push_dns    = ["1.1.1.1"]

keepalive_ping    = 10
keepalive_timeout = 60

enable_nat = true
wan_iface  = "eth1"

# Encrypt the control channel with a pre-shared key (--tls-crypt). The key
# file is generated by docker/test.sh before the stack comes up.
tls_crypt_key = "/etc/javs/pki/tc.key"

# Per-client override demo. The cert from scripts/generate-certs.sh has
# CN=client1; if it's matched we hand out a fixed IP and an extra route
# instead of relying on the pool defaults above.
[client_configs.client1]
assign_ip   = "10.8.0.42"
push_routes = ["10.42.0.0/16"]
