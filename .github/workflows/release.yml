name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: one x86-64 runner cross-builds every target via cargo-zigbuild.
          # musl targets link statically (no glibc dependency on the box).
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest, zig: true }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest, zig: true }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, zig: true }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest, zig: true }
          # macOS: built natively (the Apple toolchain cross-compiles to x86-64).
          - { target: x86_64-apple-darwin, os: macos-latest, zig: false }
          - { target: aarch64-apple-darwin, os: macos-latest, zig: false }

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Zig supplies the cross C compiler/linker that `ring` (rustls) needs to
      # build for musl and the non-host arch from one x86-64 Linux runner.
      # Pinned to the Zig version verified to build this project.
      - name: Set up Zig
        if: matrix.zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install cargo-zigbuild
        if: matrix.zig
        run: cargo install cargo-zigbuild --locked

      - name: Build (Linux, zigbuild)
        if: matrix.zig
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (macOS, native)
        if: ${{ !matrix.zig }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          name="javs-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$name/configs"
          cp "target/${{ matrix.target }}/release/javs" "$name/"
          cp README.md ROADMAP.md "$name/"
          # Ship the config templates and helper scripts, but NEVER the PKI
          # under configs/pki (it contains private keys).
          cp configs/server.toml configs/client.ovpn "$name/configs/"
          cp -r scripts "$name/"
          tar czf "${name}.tar.gz" "$name"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256" 2>/dev/null \
            || shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "ASSET=${name}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
